name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pytest

      - name: Validate dataset registry
        run: python analysis/00_validate_dataset_registry.py

      - name: Run tests
        run: pytest -q
