name: Notify Living CV

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'PROJECT_STATUS.md'
      - 'REPRODUCIBILITY.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - 'docs/**'

jobs:
  notify-living-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch public living CV refresh
        if: ${{ secrets.LIVING_CV_DISPATCH_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.LIVING_CV_DISPATCH_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/pskeffington/CV-Public-Facing/dispatches \
            -d "{\"event_type\":\"living-cv-source-updated\",\"client_payload\":{\"source_repo\":\"${SOURCE_REPO}\",\"source_sha\":\"${SOURCE_SHA}\"}}"
      - name: Skip notice
        if: ${{ secrets.LIVING_CV_DISPATCH_TOKEN == '' }}
        run: echo "LIVING_CV_DISPATCH_TOKEN is not configured; skipping living CV dispatch."
